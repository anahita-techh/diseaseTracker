<!DOCTYPE html>
<html>
<head>
  <title>Citizen Form</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="app-wrapper">

  <div class="container">

    <h2>⚙️ Alert Setup</h2>

    <select id="region">
      <option value="">Select Region</option>
      <option value="Mumbai">Mumbai</option>
      <option value="Delhi">Delhi</option>
      <option value="Pune">Pune</option>
    </select>

    <select id="disease">
      <option value="All">All Diseases</option>
      <option value="Cholera">Cholera</option>
      <option value="Dengue">Dengue</option>
      <option value="Typhoid">Typhoid</option>
    </select>

    <input type="number" id="threshold" placeholder="Enter Alert Threshold">

    <button onclick="saveSettings()">Save Settings</button>

  </div>

</div>

<div class="bottom-nav">
  <button onclick="goHome()"><i class="fas fa-home"></i></button>
  <button onclick="goToProfile()"><i class="fas fa-user-circle"></i></button>
  <button class="active"><i class="fas fa-cog"></i></button>
</div>

<script src="form.js"></script>

</body>
</html>
